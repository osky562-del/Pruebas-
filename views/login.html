<!-- Login View -->
<div class="page active h-full flex flex-col justify-center items-center px-6 relative overflow-hidden" style="min-height: 100dvh; background: var(--ios-bg);">
    <!-- Background Elements -->
    <div class="absolute top-10 left-0 w-64 h-64 bg-ios-green/20 rounded-full blur-[80px]"></div>
    <div class="absolute bottom-20 right-0 w-72 h-72 bg-ios-blue/20 rounded-full blur-[100px]"></div>

    <!-- Branding -->
    <div class="text-center mb-10 relative z-10 w-full">
        <div class="w-24 h-24 mx-auto bg-ios-green-grad text-black text-4xl flex items-center justify-center rounded-[32px] shadow-[0_0_40px_rgba(48,209,88,0.4)] mb-6">
            <span class="material-symbols-outlined text-[3rem]">fitness_center</span>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter mb-2">KO95FIT</h1>
        <p class="text-ios-label2 font-medium">Libera tu potencial cinético.</p>
    </div>

    <!-- Form -->
    <div class="w-full max-w-sm space-y-4 relative z-10 mb-8">
        <div class="card !p-1 bg-ios-bg2/80 backdrop-blur-xl border border-ios-sep">
            <div class="ios-input-field !border-b !border-ios-sep">
                <span class="material-symbols-outlined text-ios-label2">mail</span>
                <input type="email" class="iif-input !text-left pl-2" placeholder="Correo electrónico" id="loginEmail">
            </div>
            <div class="ios-input-field !border-none">
                <span class="material-symbols-outlined text-ios-label2">lock</span>
                <input type="password" class="iif-input !text-left pl-2" placeholder="Contraseña" id="loginPass">
            </div>
        </div>
        
        <button onclick="window.handleLogin()" class="ios-btn w-full shadow-lg shadow-ios-green/20">
            Entrar
        </button>
        
        <div class="text-center pt-2">
            <a href="#" class="text-ios-green text-sm font-bold">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <!-- Social -->
    <div class="w-full max-w-sm relative z-10">
        <div class="flex items-center gap-4 mb-6">
            <div class="h-px bg-ios-sep flex-1"></div>
            <span class="text-xs text-ios-label3 font-bold uppercase tracking-widest">O continuar con</span>
            <div class="h-px bg-ios-sep flex-1"></div>
        </div>
        
        <button onclick="window.handleLogin()" class="w-full h-14 rounded-2xl bg-white text-black font-bold flex items-center justify-center gap-3 active:scale-95 transition-transform mb-3">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545 10.239v3.821h5.45c-.712 2.315-2.77 3.969-5.45 3.969-3.21 0-5.811-2.601-5.811-5.811 0-3.21 2.601-5.811 5.811-5.811 1.487 0 2.842.569 3.882 1.5l2.802-2.801C17.514 3.424 15.176 2.4 12.545 2.4c-5.32 0-9.636 4.315-9.636 9.636s4.316 9.636 9.636 9.636c5.568 0 9.255-3.918 9.255-9.428 0-.649-.063-1.275-.175-1.89h-9.08z"/></svg>
            Entrar con Google
        </button>
        <button onclick="window.handleLogin()" class="w-full h-14 rounded-2xl bg-[#000000] border border-ios-sep text-white font-bold flex items-center justify-center gap-3 active:scale-95 transition-transform">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.04 2.26-.79 3.59-.76 1.4.03 2.6.54 3.42 1.5-3.07 1.77-2.6 5.84.45 7.15-.71 1.76-1.55 3.32-2.54 4.28zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.3 2.3-1.8 4.29-3.74 4.25z"/></svg>
            Entrar con Apple
        </button>
    </div>
</div>
