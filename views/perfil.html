<!-- Profile View -->
<div class="page active">
    <!-- Profile Header (Editable) -->
    <div class="flex flex-col items-center mb-8 pt-4 relative">
        <label for="avatarUpload" class="relative group cursor-pointer w-24 h-24 rounded-full bg-ios-bg3 flex items-center justify-center text-4xl shadow-lg mb-4 border-4 border-ios-bg2 overflow-hidden">
            <img id="userAvatar" src="" alt="Avatar" class="w-full h-full object-cover hidden">
            <span id="userAvatarEmoji" class="absolute">👤</span>
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined text-white text-3xl">photo_camera</span>
            </div>
        </label>
        <input type="file" id="avatarUpload" accept="image/*" class="hidden" onchange="window.handleAvatarUpload(event)">
        
        <input type="text" id="userName" class="text-2xl font-black italic tracking-tight text-center bg-transparent border-b border-transparent hover:border-ios-sep focus:border-ios-green focus:ring-0 w-3/4 max-w-sm transition-colors outline-none pb-1" value="Tu Nombre" placeholder="Introduce tu nombre" onblur="window.saveProfile()">
        <input type="email" id="userEmail" class="text-ios-label2 text-sm font-medium text-center bg-transparent border-b border-transparent hover:border-ios-sep focus:border-ios-green focus:ring-0 w-3/4 max-w-sm transition-colors outline-none pb-1 mt-1" value="tu.email@ejemplo.com" placeholder="Correo electrónico" onblur="window.saveProfile()">
    </div>

    <!-- Progress Photos & Measurements (User editable) -->
    <div class="sec-header mt-2 flex justify-between items-center">
        <span>Progreso Visual</span>
        <button onclick="document.getElementById('progressUpload').click()" class="text-ios-green text-xs font-bold uppercase tracking-widest px-2">Añadir</button>
    </div>
    <input type="file" id="progressUpload" accept="image/*" class="hidden" onchange="window.handleProgressUpload(event)">
    
    <div id="progressGallery" class="flex gap-3 overflow-x-auto pb-4 noscroll mb-4">
        <!-- Gallery populated by JS -->
        <button onclick="document.getElementById('progressUpload').click()" class="w-28 h-36 bg-ios-bg2 rounded-xl flex-shrink-0 flex items-center justify-center border-2 border-dashed border-ios-sep text-ios-label3 flex-col gap-2 hover:bg-ios-bg3 transition">
            <span class="material-symbols-outlined text-3xl">add_a_photo</span>
            <span class="text-[0.65rem] font-bold">Nueva Foto</span>
        </button>
    </div>

    <div class="sec-header">Métricas Corporales</div>
    <div class="card mb-6">
        <div class="flex items-center gap-4">
            <span class="text-2xl">⚖️</span>
            <input type="number" class="flex-1 bg-transparent border-none text-xl font-bold focus:ring-0" placeholder="76.5 kg" step="0.1">
            <button onclick="showToast('Peso actualizado')" class="bg-ios-green text-black px-4 py-2 rounded-xl font-bold text-sm">Guardar</button>
        </div>
    </div>

    <div class="sec-header">Estadísticas de Cuenta</div>
    <div class="flex flex-col gap-2 mb-6">
        <div class="card !p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-ios-green/10 flex items-center justify-center text-ios-green">
                <span class="material-symbols-outlined">calendar_today</span>
            </div>
            <div class="flex-1">
                <div class="text-xs text-ios-label2 font-bold uppercase tracking-wider">Sesiones este mes</div>
                <div class="text-lg font-black">12</div>
            </div>
            <span class="material-symbols-outlined text-ios-label3">chevron_right</span>
        </div>

        <div class="card !p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-ios-orange/10 flex items-center justify-center text-ios-orange">
                <span class="material-symbols-outlined">fitness_center</span>
            </div>
            <div class="flex-1">
                <div class="text-xs text-ios-label2 font-bold uppercase tracking-wider">Volumen Total</div>
                <div class="text-lg font-black">54,320 kg</div>
            </div>
            <span class="material-symbols-outlined text-ios-label3">chevron_right</span>
        </div>
    </div>

    <div class="sec-header">Ajustes</div>
    <div class="flex flex-col gap-2 mb-8">
        <a href="#pro" class="card !p-4 flex items-center gap-4 text-inherit no-underline">
            <div class="w-10 h-10 rounded-xl bg-ios-yellow/10 flex items-center justify-center text-ios-yellow">
                <span class="material-symbols-outlined">military_tech</span>
            </div>
            <div class="flex-1">
                <div class="font-bold">KO95FIT-PRO</div>
                <div class="text-xs text-ios-label2">Totalmente Desbloqueado</div>
            </div>
            <span class="material-symbols-outlined text-ios-label3">chevron_right</span>
        </a>
    </div>

    <button onclick="window.handleLogout()" class="ios-btn red">
        <span class="material-symbols-outlined">logout</span>
        Cerrar Sesión
    </button>
</div>
