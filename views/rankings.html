<!-- Rankings View -->
<div class="page active">
    <!-- Header -->
    <div class="flex flex-col items-center mb-6 pt-4 relative bg-ios-bg2 p-6 rounded-b-3xl shadow-lg border-b border-ios-sep">
        <div class="absolute top-0 left-0 w-full h-full bg-ios-yellow/5 blur-[40px] pointer-events-none"></div>
        <div class="w-20 h-20 rounded-[20px] bg-ios-yellow-grad flex items-center justify-center text-3xl shadow-[0_0_20px_rgba(255,214,10,0.4)] mb-3 relative z-10 border-2 border-ios-yellow/30">
            <span class="material-symbols-outlined text-black font-black">trophy</span>
        </div>
        <h2 class="text-2xl font-black italic tracking-tight text-ios-yellow font-headline">LIGA KO95FIT</h2>
        <p class="text-ios-label2 text-xs font-bold uppercase tracking-widest mt-1">Clasificación Global</p>
    </div>

    <!-- Podium -->
    <div class="flex items-end justify-center gap-3 mb-8 h-40">
        <!-- 2nd -->
        <div class="flex flex-col items-center flex-1">
            <div class="w-12 h-12 rounded-full border-2 border-[#C0C0C0] overflow-hidden mb-2 z-10 bg-ios-bg3">
                <img src="https://images.unsplash.com/photo-1549476464-37392f717541?w=100&h=100&fit=crop" class="w-full h-full object-cover">
            </div>
            <div class="w-full bg-gradient-to-t from-ios-bg3 to-[#C0C0C0]/20 rounded-t-xl border-t border-[#C0C0C0]/40 flex flex-col items-center justify-start pt-2 h-24">
                <span class="font-black text-lg">2</span>
                <span class="text-[0.6rem] font-bold text-ios-label2">14k XP</span>
            </div>
        </div>
        <!-- 1st -->
        <div class="flex flex-col items-center flex-[1.2]">
            <span class="text-xl mb-1 filter drop-shadow-[0_0_8px_rgba(255,214,10,0.8)] animate-bounce">👑</span>
            <div class="w-16 h-16 rounded-full border-4 border-ios-yellow overflow-hidden mb-2 z-10 bg-ios-bg3 shadow-[0_0_15px_rgba(255,214,10,0.5)]">
                <img src="https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=100&h=100&fit=crop" class="w-full h-full object-cover">
            </div>
            <div class="w-full bg-gradient-to-t from-ios-bg3 to-ios-yellow/20 rounded-t-xl border-t-2 border-ios-yellow/50 flex flex-col items-center justify-start pt-2 h-32">
                <span class="font-black text-2xl text-ios-yellow">1</span>
                <span class="text-xs font-black">15.2k XP</span>
            </div>
        </div>
        <!-- 3rd -->
        <div class="flex flex-col items-center flex-1">
            <div class="w-12 h-12 rounded-full border-2 border-[#CD7F32] overflow-hidden mb-2 z-10 bg-ios-bg3">
                <img src="https://images.unsplash.com/photo-1507314961139-89dc00407e77?w=100&h=100&fit=crop" class="w-full h-full object-cover grayscale">
            </div>
            <div class="w-full bg-gradient-to-t from-ios-bg3 to-[#CD7F32]/20 rounded-t-xl border-t border-[#CD7F32]/40 flex flex-col items-center justify-start pt-2 h-20">
                <span class="font-black text-lg">3</span>
                <span class="text-[0.6rem] font-bold text-ios-label2">12.5k XP</span>
            </div>
        </div>
    </div>

    <!-- Leaderboard List -->
    <div class="sec-header">Tu Clasificación</div>
    
    <div class="flex flex-col gap-2 mb-8">
        <!-- Other user -->
        <div class="card !p-3 flex items-center gap-4">
            <span class="font-black text-ios-label2 w-4 text-center">4</span>
            <div class="w-10 h-10 rounded-full bg-ios-bg3 overflow-hidden border border-ios-sep">
                <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=100&h=100&fit=crop" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <div class="font-bold text-sm">Carlos Fit</div>
                <div class="text-[0.65rem] text-ios-label2">Racha: 12 días</div>
            </div>
            <div class="font-black text-ios-yellow text-sm">11.1k XP</div>
        </div>

        <!-- You -->
        <div class="card !p-3 flex items-center gap-4 border-2 border-ios-green relative overflow-hidden bg-ios-green/5">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-ios-green"></div>
            <span class="font-black text-ios-green w-4 text-center">5</span>
            <div class="w-10 h-10 rounded-full bg-ios-bg3 overflow-hidden border border-ios-green">
                <img id="myAvatarRank" src="" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <div class="font-black text-sm text-ios-green" id="myNameRank">Tú</div>
                <div class="text-[0.65rem] text-ios-label2 font-bold">Racha: Activa 🔥</div>
            </div>
            <div class="font-black text-ios-green text-sm flex items-center gap-1">10.5k XP</div>
        </div>

        <!-- Other user -->
        <div class="card !p-3 flex items-center gap-4">
            <span class="font-black text-ios-label2 w-4 text-center">6</span>
            <div class="w-10 h-10 rounded-full bg-ios-bg3 border border-ios-sep flex items-center justify-center">
                <span class="material-symbols-outlined text-ios-label3 text-sm">person</span>
            </div>
            <div class="flex-1">
                <div class="font-bold text-sm text-ios-label2">Usuario Oculto</div>
                <div class="text-[0.65rem] text-ios-label2">Racha: 3 días</div>
            </div>
            <div class="font-bold text-ios-label2 text-sm">9.8k XP</div>
        </div>
    </div>
</div>

<script>
    // Inject dynamic user data into the ranking row
    (function(){
        const prof = JSON.parse(localStorage.getItem('koProfile')) || {};
        const nameEl = document.getElementById('myNameRank');
        const avEl = document.getElementById('myAvatarRank');
        if(nameEl && prof.name) nameEl.textContent = prof.name + " (Tú)";
        if(avEl && prof.avatar) avEl.src = prof.avatar;
        else if (avEl) avEl.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
    })();
</script>
